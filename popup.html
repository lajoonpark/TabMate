<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TabSweep</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="popup">
      <header class="popup__header">
        <div>
          <h1>TabSweep</h1>
          <p id="summary" class="summary">Loading tabs…</p>
        </div>
      </header>

      <section id="undo-banner" class="undo-banner hidden" aria-live="polite" role="status">
        <span id="undo-text"></span>
        <button id="undo-button" class="link-button" type="button">Undo</button>
      </section>

      <section class="section">
        <div class="section__title-row">
          <h2>Categories</h2>
        </div>
        <div id="categories" class="cards"></div>
      </section>

      <section class="section">
        <div class="section__title-row">
          <h2>Duplicate URLs</h2>
          <button id="close-duplicates" class="danger-button" type="button">Close duplicates</button>
        </div>
        <div id="duplicates" class="duplicates"></div>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
